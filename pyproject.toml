[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  "node_modules",
  "frontend/dist",
  "data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["backend/tests", "ingestion/tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers"
