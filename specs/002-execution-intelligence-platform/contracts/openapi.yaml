openapi: 3.1.0
info:
  title: Cipla EMEU Execution Intelligence API
  version: 0.1.0
  description: Read-only dashboard API plus grounded AI query endpoint for the protected MVP.
servers:
  - url: http://localhost:8000
    description: Local backend
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/filters:
    get:
      summary: Available dashboard filters
      responses:
        "200":
          description: Filter options and latest ingestion metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiltersResponse"
  /api/ingestion/latest:
    get:
      summary: Latest ingestion run summary
      responses:
        "200":
          description: Latest run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionSummary"
  /api/data-quality:
    get:
      summary: Data quality dashboard summary
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: Data quality metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataQualityResponse"
  /api/workflow/summary:
    get:
      summary: Request and post-event workflow governance summary
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
        - $ref: "#/components/parameters/InterventionType"
        - $ref: "#/components/parameters/IncludeOutOfScope"
      responses:
        "200":
          description: Request approval, confirmation, and reporting status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSummaryResponse"
  /api/workflow/requests:
    get:
      summary: Workflow governance request-level rows
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
        - $ref: "#/components/parameters/InterventionType"
        - $ref: "#/components/parameters/IncludeOutOfScope"
        - name: workflowStatus
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated workflow governance rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRequestsResponse"
  /api/interventions/mix:
    get:
      summary: Intervention type and subtype mix
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
        - $ref: "#/components/parameters/IncludeOutOfScope"
      responses:
        "200":
          description: Intervention type counts, spend, and workflow mix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionMixResponse"
  /api/execution/summary:
    get:
      summary: Execution KPI summary
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
        - $ref: "#/components/parameters/IncludeOutOfScope"
        - $ref: "#/components/parameters/Therapy"
        - $ref: "#/components/parameters/EventType"
      responses:
        "200":
          description: Execution KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionSummaryResponse"
  /api/execution/events:
    get:
      summary: Event-level execution matrix
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
        - $ref: "#/components/parameters/IncludeOutOfScope"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
  /api/budget/summary:
    get:
      summary: Budget utilization summary
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: Budget KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetSummaryResponse"
  /api/doctors/roi:
    get:
      summary: Doctor ROI rows
      parameters:
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/MonthStart"
        - $ref: "#/components/parameters/MonthEnd"
        - name: roiSegment
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated doctor ROI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorRoiResponse"
  /api/doctors/{countryCode}/{pcode}:
    get:
      summary: Doctor detail
      parameters:
        - name: countryCode
          in: path
          required: true
          schema:
            type: string
        - name: pcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Doctor profile, engagement, prescription trend, and limitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorDetailResponse"
        "404":
          description: Doctor not found
  /api/ai/query:
    post:
      summary: Grounded AI business question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiQueryRequest"
      responses:
        "200":
          description: Grounded answer with metrics and limitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiQueryResponse"
components:
  parameters:
    Country:
      name: country
      in: query
      schema:
        type: string
    Month:
      name: month
      in: query
      schema:
        type: string
        example: "2026-05"
    MonthStart:
      name: monthStart
      in: query
      schema:
        type: string
        example: "2025-11"
    MonthEnd:
      name: monthEnd
      in: query
      schema:
        type: string
        example: "2026-03"
    Therapy:
      name: therapy
      in: query
      schema:
        type: string
    EventType:
      name: eventType
      in: query
      schema:
        type: string
    InterventionType:
      name: interventionType
      in: query
      schema:
        type: string
    IncludeOutOfScope:
      name: includeOutOfScope
      in: query
      schema:
        type: boolean
        default: false
      description: Include audit-only rows outside Nepal/Sri Lanka Apr-May 2026 Phase 4 production scope.
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ResponseMeta:
      type: object
      required: [generatedAt, latestIngestionStatus, dataQualityFlags, limitations]
      properties:
        generatedAt:
          type: string
          format: date-time
        latestIngestionRunId:
          type: string
          nullable: true
        latestIngestionStatus:
          type: string
        dataQualityFlags:
          type: array
          items:
            type: string
        limitations:
          type: array
          items:
            type: string
        sourceDerivationNotes:
          type: array
          items:
            type: string
    FiltersResponse:
      type: object
      required: [meta, countries, months]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        countries:
          type: array
          items:
            type: string
        months:
          type: array
          items:
            type: string
        therapies:
          type: array
          items:
            type: string
        eventTypes:
          type: array
          items:
            type: string
        brands:
          type: array
          items:
            type: string
    IngestionSummary:
      type: object
      required: [id, status, rowsSeen, rowsLoaded, rowsSkipped, warningCount, errorCount]
      properties:
        id:
          type: string
        status:
          type: string
        rowsSeen:
          type: integer
        rowsLoaded:
          type: integer
        rowsSkipped:
          type: integer
        warningCount:
          type: integer
        errorCount:
          type: integer
    DataQualityResponse:
      type: object
      required: [meta, matchCoverage, pcodeCoverage, rcpaCoverage, validationErrors]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        matchCoverage:
          type: number
        snapshotSourceCounts:
          type: object
          additionalProperties:
            type: integer
        pcodeCoverage:
          type: number
        rcpaCoverage:
          type: number
        validationErrors:
          type: integer
        unmatchedRecords:
          type: integer
    ExecutionSummaryResponse:
      type: object
      required: [meta, plannedEvents, matchedEvents, executedEvents, actionDueEvents, matchCoverage]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        plannedEvents:
          type: integer
        matchedEvents:
          type: integer
        weakOrUnmatchedEvents:
          type: integer
        executedEvents:
          type: integer
        actionDueEvents:
          type: integer
        plannedEventsWithExecutedEvidence:
          type: integer
        plannedEventsWithActionDueEvidence:
          type: integer
        executedSnapshotCount:
          type: integer
        actionDueSnapshotCount:
          type: integer
        plannedHcps:
          type: integer
        engagedHcps:
          type: integer
        matchedEngagedHcps:
          type: integer
        rawEngagedHcps:
          type: integer
        hcpExecutionRate:
          type: number
        eventExecutionRate:
          type: number
        matchCoverage:
          type: number
        snapshotSourceCounts:
          type: object
          additionalProperties:
            type: integer
        primaryScope:
          type: boolean
        scopeStatuses:
          type: array
          items:
            type: string
        scopeReasons:
          type: array
          items:
            type: string
    EventListResponse:
      type: object
      required: [meta, page, pageSize, total, rows]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        rows:
          type: array
          items:
            type: object
    BudgetSummaryResponse:
      type: object
      required: [meta, plannedBudget, confirmedContractedAmount, actualTotalSpend, currencyCode, missingFx]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        plannedBudget:
          type: number
        estimatedIntervention:
          type: number
          nullable: true
        confirmedContractedAmount:
          type: number
          nullable: true
        confirmedVsEstimatedVariance:
          type: number
          nullable: true
        directHcpBtuSpend:
          type: number
          nullable: true
        overheadBtcSpend:
          type: number
          nullable: true
        actualTotalSpend:
          type: number
        unspentGap:
          type: number
        overrunAmount:
          type: number
        currencyCode:
          type: string
        missingFx:
          type: boolean
        fxRateDate:
          type: string
          nullable: true
        fxRateSource:
          type: string
          nullable: true
        fxRateStatus:
          type: string
          enum: [official, provisional, missing]
    WorkflowSummaryResponse:
      type: object
      required: [meta, requestApprovalCounts, requestConfirmationCounts, postApprovalCounts, postConfirmationCounts, ownerStageCounts]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        requestApprovalCounts:
          type: object
          additionalProperties:
            type: integer
        requestConfirmationCounts:
          type: object
          additionalProperties:
            type: integer
        postApprovalCounts:
          type: object
          additionalProperties:
            type: integer
        postConfirmationCounts:
          type: object
          additionalProperties:
            type: integer
        ownerStageCounts:
          type: object
          additionalProperties:
            type: integer
        pendingRequestCount:
          type: integer
        pendingReportCount:
          type: integer
        reportsSentForCorrection:
          type: integer
        reportsApproved:
          type: integer
        expenseSubmittedCoverage:
          type: number
        expenseConfirmedCoverage:
          type: number
        primaryScope:
          type: boolean
        scopeStatuses:
          type: array
          items:
            type: string
        scopeReasons:
          type: array
          items:
            type: string
    WorkflowRequestsResponse:
      type: object
      required: [meta, page, pageSize, total, rows]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        rows:
          type: array
          items:
            type: object
            properties:
              reqId:
                type: string
              country:
                type: string
              month:
                type: string
              repName:
                type: string
                nullable: true
              interventionType:
                type: string
                nullable: true
              requestApprovalStatus:
                type: string
              requestConfirmationStatus:
                type: string
              postApprovalStatus:
                type: string
              postConfirmationStatus:
                type: string
              currentOwnerStage:
                type: string
                nullable: true
              isPrimaryPhase4Scope:
                type: boolean
              scopeStatus:
                type: string
                nullable: true
              scopeReason:
                type: string
                nullable: true
    InterventionMixResponse:
      type: object
      required: [meta, rows]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        rows:
          type: array
          items:
            type: object
            required: [interventionType, requestCount]
            properties:
              interventionType:
                type: string
              interventionSubType:
                type: string
                nullable: true
              requestCount:
                type: integer
              executedCount:
                type: integer
              executedRequestCount:
                type: integer
              matchedRequestCount:
                type: integer
              executedSnapshotCount:
                type: integer
              actionDueCount:
                type: integer
              actionDueRequestCount:
                type: integer
              actionDueSnapshotCount:
                type: integer
              matchedWithoutExecutionCount:
                type: integer
              approvedCount:
                type: integer
              reportPendingCount:
                type: integer
              confirmedContractedAmount:
                type: number
                nullable: true
              directHcpBtuSpend:
                type: number
                nullable: true
              overheadBtcSpend:
                type: number
                nullable: true
              totalActualSpend:
                type: number
                nullable: true
              fxRateStatus:
                type: string
                enum: [official, provisional, missing]
    DoctorRoiResponse:
      type: object
      required: [meta, page, pageSize, total, rows]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        rows:
          type: array
          items:
            type: object
    DoctorDetailResponse:
      type: object
      required: [meta, profile, engagementHistory, prescriptionTrend]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        profile:
          type: object
        engagementHistory:
          type: array
          items:
            type: object
        prescriptionTrend:
          type: array
          items:
            type: object
    AiQueryRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 1000
        country:
          type: string
        month:
          type: string
        pageContext:
          type: string
        filters:
          type: object
    AiQueryResponse:
      type: object
      required: [answer, supportingMetrics, limitations, confidence]
      properties:
        answer:
          type: string
        supportingMetrics:
          type: array
          items:
            type: object
        limitations:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: [high, medium, low, unavailable]
        redactionApplied:
          type: boolean
